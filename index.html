<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <!-- Daisy+Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <!-- Google font -->
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="font-['Geist'] px-60 py-4 lg:py-8 w-full h-full bg-gray-100 flex justify-center items-center">
    <!-- Login div -->
    <div class="p-8 bg-white max-w-130 flex flex-col gap-2 rounded-xl justify-center items-center border">
        <!-- Logo and Name -->
        <div class="flex flex-col gap-6 justify-center items-center">
            <img class="w-25 rounded-full" src="./assets/github-logo.png" alt="">
            <div class="flex flex-col gap-1 items-center">
                <h3 class="text-2xl font-semibold">GitHub Issues Tracker</h3>
                <p class="text-gray">Sign in to manage your issues</p>
            </div>
        </div>
        <!-- Inputs -->
        <div class="flex flex-col text-left w-90 gap-2 sm:gap-4">
            <!-- Username -->
            <div>
                <label class="font-medium">Username</label>
                <input type="text" class="input w-full rounded-lg" placeholder="Enter Username" />
                <p class="text-sm text-purple">Default: admin</p>
            </div>
            <!-- Password -->
            <div>
                <label class="font-medium">Password</label>
                <input type="password" class="input w-full rounded-lg" placeholder="Enter Password" />
                <p class="text-sm text-purple">Default: admin123</p>
            </div>
        </div>
        <!-- Sign In Button -->
        <button class="bg-[#4A00FF] text-white font-semibold w-full p-2 rounded-lg cursor-pointer">Sign In</button>
        <div class="divider text-gray">OR</div>
        <div class="flex flex-col text-center gap-1 w-full">
            <p class="font-sm">Demo Credentials:</p>
            <p class="bg-gray-100 p-6 w-full rounded-lg">
                <span class="font-semibold">Username:</span> admin
                <br>
                <span class="font-semibold">Password:</span> admin123
            </p>
        </div>
    </div>
</body>

</html>
