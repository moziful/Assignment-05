<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issues</title>
    <!-- DaisyUI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <!-- Google font -->
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="./style.css">
</head>

<body class="relative font-['Geist'] w-full min-h-screen bg-gray-100">
    <!-- Navigation Bar -->
    <header>
        <nav class="bg-white w-full px-4 lg:px-20 xl:px-30 py-4 gap-2 flex flex-col sm:flex-row justify-between">
            <a href="./issues.html" class="md:w-67 flex items-center gap-1 cursor-pointer">
                <img class="w-6 h-6" src="./assets/github-logo.png" alt="">
                <p class="text-2xl">GitHub Issues Tracker</p>
            </a>
            <div class="w-full sm:w-110 flex items-center gap-4">
                <div class="relative w-full sm:w-75 flex items-center">
                    <i class="absolute ml-4 z-10 fa-solid fa-magnifying-glass text-gray"></i>
                    <input id="searchInput" type="text" placeholder="Search issues..." class="input pl-10 rounded-lg" />
                </div>
                <button id="newIssueButton"
                    class="bg-[#4A00FF] hover:bg-[#3400b7] text-white font-semibold w-20 sm:w-32 p-2 rounded-md cursor-pointer flex gap-1 justify-center items-center">
                    <i class="fa-solid fa-plus"></i>
                    New <span class="hidden sm:block">Issue</span>
                </button>
            </div>
        </nav>
    </header>
    <main class="px-4 py-2 sm:px-6 md:px-10 lg:px-25 xl:px-48 sm:py-10 md:py-10 lg:py-15 flex flex-col">
        <!-- Catagory -->
        <div class="p-2 sm:p-6 gap-2 flex bg-white rounded-md mb-2 sm:mb-4">
            <button id="allCatagoryButton"
                class="w-30 px-3 bg-[#4A00FF] text-white py-2 font-medium border-gray-300 rounded-sm cursor-pointer">
                All
            </button>
            <button id="openCatagoryButton"
                class="w-30 px-3 py-2 font-medium text-gray border-2 border-gray-300 rounded-sm cursor-pointer">
                Open
            </button>
            <button id="closedCatagoryButton"
                class="w-30 px-3 py-2 font-medium text-gray border-2 border-gray-300 rounded-sm cursor-pointer">
                Closed
            </button>
        </div>
        <!-- Issues -->
        <div
            class="p-4 sm:p-6 flex flex-col sm:flex-row items-center justify-between gap-2 bg-white rounded-md rounded-b-none border-b-2 border-gray-200">
            <!-- Top -->
            <div class="flex gap-2">
                <div class="bg-[#ECE4FF] w-13 h-13 p-2 rounded-full justify-center items-center">
                    <img class="w-full h-full" src="./assets/Aperture.png" alt="">
                </div>
                <div>
                    <p class="font-semibold text-xl"><span id="numberOfIssues">0</span> Issues</p>
                    <p class="text-gray">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-3">
                <div class="flex gap-2 items-center">
                    <div class="bg-[#00A96E] w-3 h-3 rounded-full"></div>
                    <p>Open</p>
                </div>
                <div class="flex gap-2 items-center">
                    <div class="bg-[#A855F7] w-3 h-3 rounded-full"></div>
                    <p>Closed</p>
                </div>
            </div>
        </div>
        <!-- Cards Container-->
        <div id="issuesContainer"
            class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 bg-white rounded-md rounded-t-none">
        </div>
    </main>

    <dialog id="my_modal_1" class="modal">
        <div class="modal-box max-w-2xl">
            <h2 id="modalTitle" class="text-2xl font-bold mb-2"></h2>
            <div class="flex items-center gap-3 text-sm mb-4">
                <span id="modalStatus" class="px-3 py-1 text-xs font-semibold rounded-full bg-green-500 text-white">
                </span>
                <span class="text-gray-500">
                    Opened by <span id="modalAuthor"></span>
                </span>
                <span id="modalDate" class="text-gray"></span>
            </div>
            <div id="modalLabels" class="flex gap-2 mb-4"></div>
            <p id="modalDescription" class="text-gray mb-6"></p>
            <div class="bg-gray-100 rounded-lg p-4 flex justify-between mb-6">
                <div>
                    <p class="text-sm text-gray-500">Assignee:</p>
                    <p id="modalAssignee" class="font-semibold"></p>
                </div>
                <div>
                    <p class="text-sm text-gray-500">Priority:</p>
                    <span id="modalPriority" class="px-3 py-1 text-xs rounded-full font-semibold"></span>
                </div>
            </div>
            <!-- Close -->
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn bg-[#4A00FF] text-white hover:bg-[#3400b7]">
                        Close
                    </button>
                </form>
            </div>

        </div>
    </dialog>


    <script src="./issues.js"></script>
    <script src="./modal.js"></script>
</body>

</html>
