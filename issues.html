<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issues</title>
    <!-- DaisyUI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <!-- Google font -->
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="./style.css">
</head>

<body class="font-['Geist'] w-full min-h-screen bg-gray-100">
    <header>
        <nav class="w-full px-4 lg:px-20 py-4 gap-2 flex flex-col sm:flex-row justify-between">
            <div class="md:w-67 flex items-center gap-1">
                <img class="w-6 h-6" src="./assets/github-logo.png" alt="">
                <p class="text-2xl">GitHub Issues Tracker</p>
            </div>
            <div class="w-full sm:w-110 flex items-center gap-4">
                <div class="relative w-full sm:w-75 flex items-center">
                    <!-- Font Awesome Icon -->
                    <i class="absolute ml-4 z-10 fa-solid fa-magnifying-glass text-gray"></i>

                    <!-- Input with padding so text doesn't overlap -->
                    <input id="searchInput" type="text" placeholder="Search issues..." class="input pl-10 rounded-lg" />
                </div>
                <button id="newIssueButton"
                    class="bg-[#4A00FF] text-white font-semibold w-20 sm:w-32 p-2 rounded-md cursor-pointer flex gap-1 justify-center items-center"><i
                        class="fa-solid fa-plus"></i>
                    New <span class="hidden sm:block">Issue</span></button>
            </div>
        </nav>
    </header>


    <script src="./issues.js"></script>
</body>

</html>
